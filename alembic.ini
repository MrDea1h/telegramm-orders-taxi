[alembic]
script_location = shared/db/migrations
prepend_sys_path = .
version_path_separator = os

# sqlalchemy.url intentionally omitted — env.py injects it from
# shared.config.get_settings().DATABASE_URL at runtime so there is one
# source of truth for the DSN (no drift between .env and alembic.ini).

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
