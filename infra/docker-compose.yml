name: corpride

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-corpride}
      POSTGRES_USER: ${POSTGRES_USER:-corpride}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-corpride}
    volumes:
      - corpride-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-corpride} -d ${POSTGRES_DB:-corpride}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [corpride-net]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [corpride-net]

  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://corpride:corpride@postgres:5432/corpride}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      BOT_TOKEN: ${BOT_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [corpride-net]

  bot:
    build:
      context: ..
      dockerfile: bot/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://corpride:corpride@postgres:5432/corpride}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      BOT_TOKEN: ${BOT_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'bot.bot' >/dev/null || exit 1"]
      interval: 20s
      timeout: 3s
      retries: 5
    networks: [corpride-net]

  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://corpride:corpride@postgres:5432/corpride}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      BOT_TOKEN: ${BOT_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'arq worker.worker' >/dev/null || exit 1"]
      interval: 20s
      timeout: 3s
      retries: 5
    networks: [corpride-net]

networks:
  corpride-net:
    driver: bridge

volumes:
  corpride-pgdata:
