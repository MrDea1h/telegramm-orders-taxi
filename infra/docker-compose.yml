name: apexride

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-apexride}
      POSTGRES_USER: ${POSTGRES_USER:-apexride}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apexride}
    volumes:
      - apexride-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apexride} -d ${POSTGRES_DB:-apexride}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [apexride-net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [apexride-net]

  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      # Hardcoded to the compose-internal hostnames, deliberately NOT
      # ${DATABASE_URL:-...}/${REDIS_URL:-...} reading from .env: those
      # variables in .env are for the bare-host-process dev flow (`make
      # api`, connecting via localhost), and once --env-file correctly
      # loads .env, that same substitution would silently hand containers
      # "localhost" instead of "postgres"/"redis" — each container has its
      # own network namespace, so "localhost" there means the container
      # itself, not its neighbor.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-apexride}:${POSTGRES_PASSWORD:-apexride}@postgres:5432/${POSTGRES_DB:-apexride}
      REDIS_URL: redis://redis:6379/0
      BOT_TOKEN: ${BOT_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # Host-side port is configurable (API_HOST_PORT) so this stack can run
      # alongside others on a shared host without a fixed-port collision —
      # always bound to localhost only, never exposed publicly directly.
      - "127.0.0.1:${API_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [apexride-net]

  bot:
    build:
      context: ..
      dockerfile: bot/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      # Hardcoded to the compose-internal hostnames, deliberately NOT
      # ${DATABASE_URL:-...}/${REDIS_URL:-...} reading from .env: those
      # variables in .env are for the bare-host-process dev flow (`make
      # api`, connecting via localhost), and once --env-file correctly
      # loads .env, that same substitution would silently hand containers
      # "localhost" instead of "postgres"/"redis" — each container has its
      # own network namespace, so "localhost" there means the container
      # itself, not its neighbor.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-apexride}:${POSTGRES_PASSWORD:-apexride}@postgres:5432/${POSTGRES_DB:-apexride}
      REDIS_URL: redis://redis:6379/0
      BOT_TOKEN: ${BOT_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'bot.bot' >/dev/null || exit 1"]
      interval: 20s
      timeout: 3s
      retries: 5
    networks: [apexride-net]

  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      # Hardcoded to the compose-internal hostnames, deliberately NOT
      # ${DATABASE_URL:-...}/${REDIS_URL:-...} reading from .env: those
      # variables in .env are for the bare-host-process dev flow (`make
      # api`, connecting via localhost), and once --env-file correctly
      # loads .env, that same substitution would silently hand containers
      # "localhost" instead of "postgres"/"redis" — each container has its
      # own network namespace, so "localhost" there means the container
      # itself, not its neighbor.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-apexride}:${POSTGRES_PASSWORD:-apexride}@postgres:5432/${POSTGRES_DB:-apexride}
      REDIS_URL: redis://redis:6379/0
      BOT_TOKEN: ${BOT_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'arq worker.worker' >/dev/null || exit 1"]
      interval: 20s
      timeout: 3s
      retries: 5
    networks: [apexride-net]

  webapp:
    build:
      context: ..
      dockerfile: webapp/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      # Not localhost-only, unlike api/postgres/redis: this is the one
      # thing meant to be reached from an actual browser on another
      # machine. Plain HTTP for now (no domain/TLS yet) — fine for a
      # throwaway test deploy, revisit before anything but disposable data
      # goes through it.
      - "${WEBAPP_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [apexride-net]

networks:
  apexride-net:
    driver: bridge

volumes:
  apexride-pgdata:
